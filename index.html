<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a3824">
    <title>Solitaire</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "./game.js": "./game.js",
                "./ui.js": "./ui.js",
                "./drag.js": "./drag.js",
                "./sound.js": "./sound.js"
            }
        }
    </script>
</head>
<body>
    <div id="game-container">
        <div class="top-bar">
            <div id="stock-waste-container">
                <div id="stock">
                    <div class="stock-pile pile" data-pile="stock"></div>
                </div>
                <div id="waste">
                    <div class="waste-pile pile" data-pile="waste"></div>
                </div>
            </div>
            <div id="foundations">
                <div class="foundation-pile pile" data-pile="foundation-0"></div>
                <div class="foundation-pile pile" data-pile="foundation-1"></div>
                <div class="foundation-pile pile" data-pile="foundation-2"></div>
                <div class="foundation-pile pile" data-pile="foundation-3"></div>
            </div>
            <div id="game-menu">
                <button id="new-game-btn" aria-label="New Game" title="New Game">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"></path></svg>
                </button>
                <button id="auto-win-btn" aria-label="Auto-Play" title="Auto-Play to Foundations">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="m12 6-1.41 1.41L13.17 10H4v2h9.17l-2.58 2.59L12 16l4-4-4-4zm8-4H4c-1.1 0-2 .9-2 2v4h2V4h16v16H4v-4H2v4c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path></svg>
                </button>
            </div>
        </div>

        <div id="tableau">
            <div class="tableau-pile pile" data-pile="tableau-0"></div>
            <div class="tableau-pile pile" data-pile="tableau-1"></div>
            <div class="tableau-pile pile" data-pile="tableau-2"></div>
            <div class="tableau-pile pile" data-pile="tableau-3"></div>
            <div class="tableau-pile pile" data-pile="tableau-4"></div>
            <div class="tableau-pile pile" data-pile="tableau-5"></div>
            <div class="tableau-pile pile" data-pile="tableau-6"></div>
        </div>

        <div class="bottom-bar">
            <!-- New bottom bar for better mobile layout -->
        </div>
    </div>

    <div id="win-screen" class="hidden">
        <div class="win-message">
            <h1>You Won!</h1>
            <p>Congratulations!</p>
            <button id="win-new-game-btn">Play Again</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
<script defer src="https://static.cloudflareinsights.com/beacon.min.js/v8c78df7c7c0f484497ecbca7046644da1771523124516" integrity="sha512-8DS7rgIrAmghBFwoOTujcf6D9rXvH8xm8JQ1Ja01h9QX8EzXldiszufYa4IFfKdLUKTTrnSFXLDkUEOTrZQ8Qg==" data-cf-beacon='{"version":"2024.11.0","token":"4c6229722a6346bc8eb5cb0e5eae5d41","server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}' crossorigin="anonymous"></script>
</body>
</html>
